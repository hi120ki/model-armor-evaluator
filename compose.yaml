services:
  model-armor-evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Google Cloud configuration
      - PROJECT=<your-gcp-project-id>
      - LOCATION=us-central1
      - CONFIG_FILE=/templates.yaml
      - PORT=8080
      # Enable ADC (Application Default Credentials)
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/application_default_credentials.json
    volumes:
      # Mount Google Cloud ADC from local machine
      - ~/.config/gcloud:/gcp:ro
      # Mount templates.yaml for development (optional override)
      - ./templates.yaml:/templates.yaml:ro

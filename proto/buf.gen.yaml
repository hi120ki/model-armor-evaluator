version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: ../gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../gen
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es
    out: ../frontend/src/gen
    opt:
      - target=ts
      - import_extension=none
  - remote: buf.build/bufbuild/connect-es
    out: ../frontend/src/gen
    opt:
      - target=ts
      - import_extension=none
